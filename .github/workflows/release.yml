name: Release

on:
  push:
    branches:
      - release

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create zip
        run: |
          zip -r HorizonHaptics-v${{ steps.version.outputs.version }}.zip . \
            --exclude "*.git*" \
            --exclude "*__pycache__*" \
            --exclude "*.pyc" \
            --exclude "*.pyo" \
            --exclude ".venv/*" \
            --exclude "dist/*" \
            --exclude "build/*" \
            --exclude "*.egg-info/*" \
            --exclude ".github/*"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: HorizonHaptics v${{ steps.version.outputs.version }}
          files: HorizonHaptics-v${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
